name: Update Russian IP lists

on:
  # Каждый день в 06:00 UTC (09:00 МСК)
  schedule:
    - cron: "0 6 * * *"

  workflow_dispatch:

  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "config/**"
      - ".github/workflows/update.yml"

permissions:
  contents: write

jobs:
  update:
    name: Update Russian IP lists
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Restore ASN cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: asn-cache-${{ github.run_id }}
          restore-keys: asn-cache-

      - name: Download zones and generate ru-bypass.json
        run: bash scripts/update.sh --compact

      - name: Check if lists changed
        id: diff
        run: |
          git add lists/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updated lists
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FINAL=$(jq '.finalCidrs' lists/stats.json)
          ADDED=$(jq '.diff.added' lists/stats.json)
          REMOVED=$(jq '.diff.removed' lists/stats.json)
          TODAY=$(date -u '+%Y-%m-%d')

          git commit -m "chore(lists): update [${TODAY}] · ${FINAL} CIDRs (+${ADDED} / -${REMOVED})"
          git push

      - name: No changes detected
        if: steps.diff.outputs.changed == 'false'
        run: echo "Списки не изменились, коммит не нужен."

      - name: Create release
        if: steps.diff.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "lists-${{ github.run_number }}"
          name: "Обновление списков #${{ github.run_number }}"
          body: |
            Автоматическое обновление IP-списков

            ## Источники
            - [ipdeny.com](https://www.ipdeny.com/ipblocks/)
            - [escapingworm/russia-whitelist](https://github.com/escapingworm/russia-whitelist)
            - [bgpview.io](https://bgpview.io/) / [stat.ripe.net](https://stat.ripe.net/) — ASN-префиксы
          files: |
            lists/ru-bypass.json
            lists/stats.json
          make_latest: true
